<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshwuff | Official Brand Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(129, 140, 248, 0.1) 0%, transparent 40%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 60px 24px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Section */
        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #818cf8);
            margin: 0 auto 24px;
            border: 4px solid var(--glass-border);
            box-shadow: 0 0 20px var(--accent-glow);
            object-fit: cover;
        }

        h1 { font-size: 1.75rem; margin: 0; font-weight: 700; letter-spacing: -0.025em; }
        .handle { color: var(--accent); font-size: 1rem; margin-top: 6px; font-weight: 600; }
        .bio { font-size: 1rem; color: var(--text-secondary); margin: 24px 0 40px; line-height: 1.6; }

        /* Links Section */
        .links-container { display: flex; flex-direction: column; gap: 14px; }

        .link-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: var(--accent);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 0 10px var(--accent-glow);
        }

        /* Footer */
        footer {
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .contact-email {
            color: var(--accent);
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .contact-email:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-img"></div> 
        
        <h1>Joshwuff</h1>
        <div class="handle">@joshwuff</div>
        
        <p class="bio">Digital creator, gaming enthusiast, and official home of the Joshwuff brand.</p>

        <div class="links-container">
            <a href="https://discord.gg/joshwuff" class="link-card">Join the Discord</a>
            <a href="https://patreon.com/joshwuff" class="link-card">Support on Patreon</a>
            <a href="https://snapchat.com/add/joshwuff" class="link-card">Add on Snapchat</a>
            <a href="https://x.com/joshwuff_" class="link-card">Follow on X (@joshwuff_)</a>
            <a href="https://instagram.com/joshwuff" class="link-card">Instagram</a>
            <a href="https://vrc.group/JOSHWUFF" class="link-card">VRChat Community</a>
        </div>

        <footer>
            <p>&copy; 2026 Joshwuff. All rights reserved.</p>
            <a href="mailto:contact@joshwuff.com" class="contact-email">contact@joshwuff.com</a>
        </footer>
    </div>
</body>
</html>
