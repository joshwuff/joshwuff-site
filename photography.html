<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | Joshwuff</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <link rel="apple-touch-icon" href="favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">Socials</a>
        <a href="photography.html" class="nav-link active">Photography</a>
        <a href="contact.html" class="nav-link">Contact</a>
    </nav>

    <div class="container gallery-container">
        <h1>Photography</h1>
        <div class="subtitle">By joshwuff</div>
        <p class="bio">Capturing moments all around the country and beyond! Select a category below to filter my latest work.</p>

        <div class="gallery-controls-wrapper">
            <div class="filter-controls">
                <label class="checkbox-label"><input type="checkbox" value="all" class="filter-checkbox" checked> All</label>
                <label class="checkbox-label"><input type="checkbox" value="nature" class="filter-checkbox"> Nature</label>
                <label class="checkbox-label"><input type="checkbox" value="furry" class="filter-checkbox"> Furry</label>
                <label class="checkbox-label"><input type="checkbox" value="other" class="filter-checkbox"> Other</label>
            </div>
            
            <div class="per-page-dropdown">
                <label for="itemsPerPage">Photos per page:</label>
                <select id="itemsPerPage">
                    <option value="8">8</option>
                    <option value="24">24</option>
                    <option value="48" selected>48</option>
                    <option value="96">96</option>
                </select>
            </div>

            <div class="pagination-controls top-pagination">
                <button class="page-btn prev-page-btn">Back</button>
                <span class="page-info-display page-info">Page 1 of 1</span>
                <button class="page-btn next-page-btn">Next</button>
            </div>
        </div>

        <div class="photo-grid" id="gallery"></div>

        <div class="pagination-controls">
            <button class="page-btn prev-page-btn">Back</button>
            <span class="page-info-display page-info">Page 1 of 1</span>
            <button class="page-btn next-page-btn">Next</button>
        </div>

        <footer><p>&copy; 2026 Joshwuff. All rights reserved.</p></footer>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <span class="lightbox-prev" id="lightbox-prev">&#10094;</span>
        <img id="lightbox-img" src="" alt="Fullscreen Photography">
        <span class="lightbox-next" id="lightbox-next">&#10095;</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Page Transitions
            const navLinks = document.querySelectorAll('.nav-link');
            const container = document.querySelector('.container');
            let isTransitioning = false;
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    if (this.href !== window.location.href) {
                        e.preventDefault();
                        if (isTransitioning) return;
                        isTransitioning = true;
                        container.classList.add('fade-out');
                        setTimeout(() => { window.location.href = this.href; }, 400);
                    }
                });
            });

            // Gallery Logic
            const gallery = document.getElementById('gallery');
            const checkboxes = document.querySelectorAll('.filter-checkbox');
            const selectPerPage = document.getElementById('itemsPerPage');
            const prevBtns = document.querySelectorAll('.prev-page-btn');
            const nextBtns = document.querySelectorAll('.next-page-btn');
            const pageInfos = document.querySelectorAll('.page-info-display');

            let allPhotos = [], filteredPhotos = [], thumbnailMap = {};
            let currentPage = 1, itemsPerPage = 48, currentLightboxIndex = 0;

            try {
                const [photosRes, thumbsRes] = await Promise.all([
                    fetch('photos.json?v=2'), fetch('thumbnails.json?v=2')
                ]);
                allPhotos = (await photosRes.json()).filter(p => p.src !== undefined);
                thumbnailMap = await thumbsRes.json();
                filteredPhotos = [...allPhotos];
                renderGallery();
            } catch (error) {
                gallery.innerHTML = "<p>Failed to load gallery data.</p>";
            }

            function updateLightboxImage() {
                if (filteredPhotos.length === 0) return;
                document.getElementById('lightbox-img').src = filteredPhotos[currentLightboxIndex].src;
            }

            function renderGallery() {
                gallery.innerHTML = '';
                const totalPages = Math.ceil(filteredPhotos.length / itemsPerPage);
                if (currentPage > totalPages && totalPages > 0) currentPage = totalPages;
                const startIndex = (currentPage - 1) * itemsPerPage;
                const photosToShow = filteredPhotos.slice(startIndex, startIndex + itemsPerPage);

                photosToShow.forEach((photo, localIndex) => {
                    const photoDiv = document.createElement('div');
                    photoDiv.className = `photo-item ${photo.category}`;
                    const thumbSrc = thumbnailMap[photo.src] || photo.src;
                    photoDiv.innerHTML = `<img src="${thumbSrc}" alt="${photo.alt}" loading="lazy"><div class="photo-overlay">${photo.title}</div>`;
                    
                    const globalIndex = startIndex + localIndex;
                    photoDiv.addEventListener('click', () => {
                        currentLightboxIndex = globalIndex;
                        updateLightboxImage();
                        document.getElementById('lightbox').classList.add('active');
                    });
                    gallery.appendChild(photoDiv);
                });

                pageInfos.forEach(info => info.innerText = `Page ${currentPage} of ${totalPages || 1}`);
                prevBtns.forEach(btn => btn.disabled = currentPage === 1);
                nextBtns.forEach(btn => btn.disabled = currentPage >= totalPages || totalPages === 0);
            }

            function applyFilters() {
                const checkedValues = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
                if (checkedValues.includes('all') || checkedValues.length === 0) { filteredPhotos = [...allPhotos]; }
                else { filteredPhotos = allPhotos.filter(photo => checkedValues.includes(photo.category)); }
                currentPage = 1; renderGallery();
            }

            checkboxes.forEach(cb => {
                cb.addEventListener('change', () => {
                    if (cb.value !== 'all' && cb.checked) { document.querySelector('input[value="all"]').checked = false; }
                    else if (cb.value === 'all' && cb.checked) { checkboxes.forEach(c => { if (c.value !== 'all') c.checked = false; }); }
                    if (!Array.from(checkboxes).some(c => c.checked)) document.querySelector('input[value="all"]').checked = true;
                    applyFilters();
                });
            });

            selectPerPage.addEventListener('change', (e) => { itemsPerPage = parseInt(e.target.value); currentPage = 1; renderGallery(); });
            prevBtns.forEach(btn => btn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderGallery(); window.scrollTo({ top: gallery.offsetTop - 150, behavior: 'smooth' }); } }));
            nextBtns.forEach(btn => btn.addEventListener('click', () => { if (currentPage < Math.ceil(filteredPhotos.length / itemsPerPage)) { currentPage++; renderGallery(); window.scrollTo({ top: gallery.offsetTop - 150, behavior: 'smooth' }); } }));

            // Lightbox
            const lightbox = document.getElementById('lightbox');
            document.querySelector('.lightbox-close').addEventListener('click', () => lightbox.classList.remove('active'));
            lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('active'); });
            document.getElementById('lightbox-prev').addEventListener('click', (e) => { e.stopPropagation(); if (filteredPhotos.length) { currentLightboxIndex = (currentLightboxIndex > 0) ? currentLightboxIndex - 1 : filteredPhotos.length - 1; updateLightboxImage(); } });
            document.getElementById('lightbox-next').addEventListener('click', (e) => { e.stopPropagation(); if (filteredPhotos.length) { currentLightboxIndex = (currentLightboxIndex < filteredPhotos.length - 1) ? currentLightboxIndex + 1 : 0; updateLightboxImage(); } });
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'ArrowLeft') { currentLightboxIndex = (currentLightboxIndex > 0) ? currentLightboxIndex - 1 : filteredPhotos.length - 1; updateLightboxImage(); }
                else if (e.key === 'ArrowRight') { currentLightboxIndex = (currentLightboxIndex < filteredPhotos.length - 1) ? currentLightboxIndex + 1 : 0; updateLightboxImage(); }
                else if (e.key === 'Escape') lightbox.classList.remove('active');
            });
        });
    </script>
</body>
</html>
