<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | Joshwuff</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* The Unified Crimson Theme */
            --bg-color: #0d0d12;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #ef4444; /* Radiant Red */
            --accent-glow: rgba(239, 68, 68, 0.25);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            /* Crimson Background Glows */
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(239, 68, 68, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(185, 28, 28, 0.08) 0%, transparent 35%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 13, 18, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 18px 0;
            z-index: 1000;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-link:hover { color: var(--accent); }
        .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 4px; }

        /* Content Container - Widened for the grid */
        .container {
            width: 100%;
            max-width: 900px; 
            padding: 120px 24px 60px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2rem; margin: 0; font-weight: 700; letter-spacing: -0.03em; }
        .subtitle { color: var(--accent); font-size: 1rem; margin-top: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
        .bio { font-size: 1rem; color: var(--text-secondary); margin: 24px 0 40px; line-height: 1.6; max-width: 500px; margin-left: auto; margin-right: auto;}

        /* --- NEW FILTER CONTROLS --- */
        .filter-controls {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 15px 25px;
            border-radius: 16px;
            margin: 0 auto 40px auto;
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: fit-content;
        }

        .checkbox-label {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s ease;
        }

        .checkbox-label:hover {
            color: var(--text-primary);
        }

        .filter-checkbox {
            accent-color: var(--accent);
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        /* --- NEW PHOTO GRID --- */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 24px;
            width: 100%;
        }

        .photo-item {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1 / 1; /* Keeps images beautifully square */
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
        }

        .photo-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0.85;
            transition: opacity 0.3s ease, transform 0.5s ease;
        }

        /* Hover Effects */
        .photo-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 24px var(--accent-glow);
            border-color: var(--accent);
        }

        .photo-item:hover img {
            opacity: 1;
            transform: scale(1.05); /* Slight zoom on hover */
        }

        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(13, 13, 18, 0.95));
            color: var(--text-primary);
            padding: 30px 20px 20px;
            font-weight: 600;
            font-size: 1rem;
            text-align: left;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .photo-item:hover .photo-overlay {
            transform: translateY(0);
        }

        /* JavaScript hide class */
        .hidden {
            display: none;
        }

        footer {
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">Socials</a>
        <a href="photography.html" class="nav-link active">Photography</a>
        <a href="contact.html" class="nav-link">Contact</a>
    </nav>

    <div class="container">
        <h1>Photography</h1>
        <div class="subtitle">By joshwuff</div>
        
        <p class="bio">Capturing moments all around the country and beyond! Select a category below to filter my latest work.</p>

        <div class="filter-controls">
            <label class="checkbox-label">
                <input type="checkbox" value="all" class="filter-checkbox" checked> All
            </label>
            <label class="checkbox-label">
                <input type="checkbox" value="nature" class="filter-checkbox"> Nature
            </label>
            <label class="checkbox-label">
                <input type="checkbox" value="furry" class="filter-checkbox"> Furry
            </label>
            <label class="checkbox-label">
                <input type="checkbox" value="other" class="filter-checkbox"> Other
            </label>
        </div>

        <div class="photo-grid" id="gallery">  
        </div>

        <footer>
            <p>&copy; 2026 Joshwuff. All rights reserved.</p>
        </footer>
    </div>

    <script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const gallery = document.getElementById('gallery');
        const checkboxes = document.querySelectorAll('.filter-checkbox');

        // 1. Fetch the photos from your JSON file
        try {
            const response = await fetch('photos.json');
            const photosData = await response.json();

            // 2. Build the HTML for each photo automatically
            photosData.forEach(photo => {
                const photoDiv = document.createElement('div');
                photoDiv.className = `photo-item ${photo.category}`;
                photoDiv.innerHTML = `
                    <img src="${photo.src}" alt="${photo.alt}">
                    <div class="photo-overlay">${photo.title}</div>
                `;
                gallery.appendChild(photoDiv);
            });
        } catch (error) {
            console.error("Error loading photos:", error);
            gallery.innerHTML = "<p>Failed to load gallery.</p>";
        }

        // 3. Re-attach the Filtering Logic (Same as before)
        const photos = document.querySelectorAll('.photo-item');
        
        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                if (checkbox.value !== 'all' && checkbox.checked) {
                    document.querySelector('input[value="all"]').checked = false;
                } else if (checkbox.value === 'all' && checkbox.checked) {
                    checkboxes.forEach(cb => {
                        if (cb.value !== 'all') cb.checked = false;
                    });
                }

                const checkedValues = Array.from(checkboxes)
                    .filter(cb => cb.checked)
                    .map(cb => cb.value);

                if (checkedValues.length === 0) {
                    document.querySelector('input[value="all"]').checked = true;
                    checkedValues.push('all');
                }

                if (checkedValues.includes('all')) {
                    photos.forEach(photo => photo.classList.remove('hidden'));
                } else {
                    photos.forEach(photo => {
                        let isVisible = false;
                        checkedValues.forEach(value => {
                            if (photo.classList.contains(value)) isVisible = true;
                        });
                        if (isVisible) photo.classList.remove('hidden'); else photo.classList.add('hidden');
                    });
                }
            });
        });
    });
</script>
    </script>
</body>
</html>
