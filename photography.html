<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography | Joshwuff</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <link rel="apple-touch-icon" href="favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        /* LIGHTBOX */
        .lightbox {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(13, 13, 18, 0.95); backdrop-filter: blur(15px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        .lightbox.active { opacity: 1; pointer-events: all; }
        
        #lightbox-img {
            max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }
        
        /* This class is applied via JS while dragging/zooming so the image doesn't lag behind the mouse */
        #lightbox-img.no-transition {
            transition: none !important;
        }

        .lightbox.active #lightbox-img { transform: scale(1); }
        
        .lightbox-close {
            position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; font-weight: bold; cursor: pointer; z-index: 2001; transition: color 0.3s ease;
        }
        .lightbox-close:hover { color: var(--accent); }
        .lightbox-prev, .lightbox-next {
            position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 50px; font-weight: bold; cursor: pointer; transition: all 0.3s ease; z-index: 2001; padding: 20px; user-select: none; opacity: 0.7;
        }
        .lightbox-prev { left: 20px; }
        .lightbox-next { right: 20px; }
        .lightbox-prev:hover { opacity: 1; color: var(--accent); transform: translateY(-50%) translateX(-5px); }
        .lightbox-next:hover { opacity: 1; color: var(--accent); transform: translateY(-50%) translateX(5px); }

        /* THEME & LAYOUT */
        :root {
            --bg-color: #0d0d12; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --accent: #ef4444; --accent-glow: rgba(239, 68, 68, 0.25);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-color); color: var(--text-primary);
            display: flex; justify-content: center; min-height: 100vh; overflow-y: scroll;
            background-image: radial-gradient(circle at 15% 15%, rgba(239, 68, 68, 0.08) 0%, transparent 35%), radial-gradient(circle at 85% 85%, rgba(185, 28, 28, 0.08) 0%, transparent 35%);
        }
        .navbar {
            position: fixed; top: 0; width: 100%; background: rgba(13, 13, 18, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: center; gap: 30px; padding: 18px 0; z-index: 1000;
        }
        .nav-link { text-decoration: none; color: var(--text-secondary); font-weight: 600; font-size: 0.9rem; transition: color 0.3s; }
        .nav-link:hover { color: var(--accent); }
        .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 4px; }
        .container { width: 100%; max-width: 1280px; padding: 120px 24px 60px; text-align: center; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        h1 { font-size: 2rem; margin: 0; font-weight: 700; letter-spacing: -0.03em; }
        .subtitle { color: var(--accent); font-size: 1rem; margin-top: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
        .bio { font-size: 1rem; color: var(--text-secondary); margin: 24px auto 40px; line-height: 1.6; max-width: 500px; }

        /* CONTROLS */
        .gallery-controls-wrapper { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 40px; }
        .filter-controls { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(16px); padding: 15px 25px; border-radius: 16px; display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .checkbox-label { color: var(--text-secondary); font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: color 0.3s ease; }
        .checkbox-label:hover { color: var(--text-primary); }
        .filter-checkbox { accent-color: var(--accent); cursor: pointer; width: 16px; height: 16px; }
        .per-page-dropdown { color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .per-page-dropdown select { background: var(--bg-color); color: var(--text-primary); border: 1px solid var(--glass-border); border-radius: 8px; padding: 6px 12px; font-family: 'Inter', sans-serif; font-weight: 600; outline: none; cursor: pointer; }
        .per-page-dropdown select:focus { border-color: var(--accent); }
        .pagination-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-top: 40px; }
        .pagination-controls.top-pagination { margin-top: 10px; margin-bottom: 20px; }
        .page-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-primary); padding: 10px 24px; border-radius: 12px; font-family: 'Inter', sans-serif; font-weight: 600; font-size: 0.95rem; cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s ease; }
        .page-btn:hover:not(:disabled) { border-color: var(--accent); box-shadow: 0 0 15px var(--accent-glow); transform: translateY(-2px); }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info { color: var(--text-secondary); font-weight: 600; font-size: 0.95rem; }

        /* GRID */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fit, 280px); justify-content: center; gap: 24px; width: 100%; }
        .photo-item { position: relative; border-radius: 16px; overflow: hidden; aspect-ratio: 1/1; background: var(--glass-bg); border: 1px solid var(--glass-border); transition: all 0.3s ease; cursor: pointer; opacity: 0; animation: popIn 0.5s ease-out forwards; animation-delay: 0.15s; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.85; transition: all 0.5s ease; }
        .photo-item:hover { transform: translateY(-6px); box-shadow: 0 12px 24px var(--accent-glow); border-color: var(--accent); }
        .photo-item:hover img { opacity: 1; transform: scale(1.05); }
        .photo-overlay { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(13, 13, 18, 0.95)); color: var(--text-primary); padding: 30px 20px 20px; font-weight: 600; font-size: 1rem; text-align: left; transform: translateY(100%); transition: transform 0.3s ease; pointer-events: none; }
        .photo-item:hover .photo-overlay { transform: translateY(0); }
        footer { margin-top: 64px; padding-top: 32px; border-top: 1px solid var(--glass-border); font-size: 0.85rem; color: var(--text-secondary); }

        @media (max-width: 600px) {
            .photo-grid { grid-template-columns: 1fr; }
            .photo-item .photo-overlay { transform: translateY(0); font-size: 0.9rem; padding: 25px 12px 12px; background: linear-gradient(transparent, rgba(13, 13, 18, 0.98) 60%); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">Socials</a>
        <a href="photography.html" class="nav-link active">Photography</a>
        <a href="contact.html" class="nav-link">Contact</a>
    </nav>

    <div class="container">
        <h1>Photography</h1>
        <div class="subtitle">By joshwuff</div>
        <p class="bio">Capturing moments all around the country and beyond! Select a category below to filter my latest work.</p>

        <div class="gallery-controls-wrapper">
            <div class="filter-controls">
                <label class="checkbox-label"><input type="checkbox" value="all" class="filter-checkbox" checked> All</label>
                <label class="checkbox-label"><input type="checkbox" value="nature" class="filter-checkbox"> Nature</label>
                <label class="checkbox-label"><input type="checkbox" value="furry" class="filter-checkbox"> Furry</label>
                <label class="checkbox-label"><input type="checkbox" value="other" class="filter-checkbox"> Other</label>
            </div>
            
            <div class="per-page-dropdown">
                <label for="itemsPerPage">Photos per page:</label>
                <select id="itemsPerPage">
                    <option value="8">8</option>
                    <option value="24">24</option>
                    <option value="48">48</option>
                    <option value="96">96</option>
                </select>
            </div>

            <div class="pagination-controls top-pagination">
                <button class="page-btn prev-page-btn">Back</button>
                <span class="page-info-display page-info">Page 1 of 1</span>
                <button class="page-btn next-page-btn">Next</button>
            </div>
        </div>

        <div class="photo-grid" id="gallery"></div>

        <div class="pagination-controls">
            <button class="page-btn prev-page-btn">Back</button>
            <span class="page-info-display page-info">Page 1 of 1</span>
            <button class="page-btn next-page-btn">Next</button>
        </div>

        <footer>
            <p>&copy; 2026 Joshwuff. All rights reserved.</p>
        </footer>
    </div>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <span class="lightbox-prev" id="lightbox-prev">&#10094;</span>
        <img id="lightbox-img" src="" alt="Fullscreen Photography">
        <span class="lightbox-next" id="lightbox-next">&#10095;</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const gallery = document.getElementById('gallery');
            const checkboxes = document.querySelectorAll('.filter-checkbox');
            const selectPerPage = document.getElementById('itemsPerPage');
            const prevBtns = document.querySelectorAll('.prev-page-btn');
            const nextBtns = document.querySelectorAll('.next-page-btn');
            const pageInfos = document.querySelectorAll('.page-info-display');

            let allPhotos = [], filteredPhotos = [], thumbnailMap = {};
            let currentPage = parseInt(localStorage.getItem('joshwuff_currentPage')) || 1;
            let itemsPerPage = 48, currentLightboxIndex = 0;

            // --- ZOOM & PAN VARIABLES ---
            const lightboxImg = document.getElementById('lightbox-img');
            let imgScale = 1;
            let isPanning = false;
            let pointX = 0, pointY = 0;
            let startDragX = 0, startDragY = 0;

            try {
                const [photosRes, thumbsRes] = await Promise.all([
                    fetch('photos.json?v=2'),
                    fetch('thumbnails.json?v=2')
                ]);
                allPhotos = (await photosRes.json()).filter(photo => photo.src !== undefined);
                thumbnailMap = await thumbsRes.json();
                
                const savedFilters = JSON.parse(localStorage.getItem('joshwuff_filters')) || ['all'];
                const savedPerPage = localStorage.getItem('joshwuff_perPage') || '48';

                selectPerPage.value = savedPerPage;
                itemsPerPage = parseInt(savedPerPage);

                checkboxes.forEach(cb => {
                    cb.checked = savedFilters.includes(cb.value);
                });

                applyFilters();

                const savedScrollPos = localStorage.getItem('joshwuff_scrollPos');
                if (savedScrollPos) {
                    setTimeout(() => {
                        window.scrollTo(0, parseInt(savedScrollPos));
                    }, 10);
                }

            } catch (error) {
                gallery.innerHTML = "<p>Failed to load gallery data.</p>";
            }

            // --- ZOOM & PAN FUNCTIONS ---
            function applyTransform() {
                lightboxImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${imgScale})`;
            }

            function resetZoom() {
                imgScale = 1;
                pointX = 0;
                pointY = 0;
                lightboxImg.classList.remove('no-transition'); // Restore CSS transition
                lightboxImg.style.transform = `translate(0px, 0px) scale(1)`;
                lightboxImg.style.cursor = 'default';
            }

            // 1. Scroll to Zoom
            lightboxImg.addEventListener('wheel', (e) => {
                e.preventDefault(); // Prevent page scrolling while hovering the image
                
                lightboxImg.classList.add('no-transition'); // Make zoom snappy
                
                const zoomSpeed = 0.15;
                if (e.deltaY < 0) {
                    imgScale += zoomSpeed; // scroll up = zoom in
                } else {
                    imgScale -= zoomSpeed; // scroll down = zoom out
                }
                
                // Limit zoom between 1x (normal) and 5x (close up)
                imgScale = Math.min(Math.max(1, imgScale), 5);
                
                if (imgScale === 1) {
                    pointX = 0;
                    pointY = 0;
                    lightboxImg.style.cursor = 'default';
                } else {
                    lightboxImg.style.cursor = 'grab';
                }
                
                applyTransform();

                // Re-enable smooth transitions slightly after scrolling stops
                clearTimeout(lightboxImg.wheelTimeout);
                lightboxImg.wheelTimeout = setTimeout(() => {
                    lightboxImg.classList.remove('no-transition');
                }, 150);
            });

            // 2. Click to Drag
            lightboxImg.addEventListener('mousedown', (e) => {
                if (imgScale > 1) {
                    e.preventDefault(); // Prevent the browser from trying to "save" the image
                    isPanning = true;
                    lightboxImg.classList.add('no-transition'); // Disable smoothing so it drags perfectly with mouse
                    startDragX = e.clientX - pointX;
                    startDragY = e.clientY - pointY;
                    lightboxImg.style.cursor = 'grabbing';
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                pointX = e.clientX - startDragX;
                pointY = e.clientY - startDragY;
                applyTransform();
            });

            window.addEventListener('mouseup', () => {
                if (isPanning) {
                    isPanning = false;
                    lightboxImg.classList.remove('no-transition'); // Restore smoothing
                    lightboxImg.style.cursor = imgScale > 1 ? 'grab' : 'default';
                }
            });

            // --- GALLERY LOGIC ---
            function updateLightboxImage() {
                if (filteredPhotos.length === 0) return;
                resetZoom(); // Always reset back to normal view when changing pictures!
                lightboxImg.src = filteredPhotos[currentLightboxIndex].src;
            }

            function renderGallery() {
                gallery.innerHTML = '';
                const totalPages = Math.ceil(filteredPhotos.length / itemsPerPage);
                
                if (currentPage > totalPages && totalPages > 0) {
                    currentPage = totalPages;
                    localStorage.setItem('joshwuff_currentPage', currentPage);
                } else if (totalPages === 0) {
                    currentPage = 1;
                    localStorage.setItem('joshwuff_currentPage', currentPage);
                }

                const startIndex = (currentPage - 1) * itemsPerPage;
                const photosToShow = filteredPhotos.slice(startIndex, startIndex + itemsPerPage);

                photosToShow.forEach((photo, localIndex) => {
                    const photoDiv = document.createElement('div');
                    photoDiv.className = `photo-item ${photo.category}`;
                    const thumbSrc = thumbnailMap[photo.src] || photo.src;
                    photoDiv.innerHTML = `<img src="${thumbSrc}" alt="${photo.alt}" loading="lazy"><div class="photo-overlay">${photo.title}</div>`;
                    
                    const globalIndex = startIndex + localIndex;
                    photoDiv.addEventListener('click', () => {
                        currentLightboxIndex = globalIndex;
                        updateLightboxImage();
                        document.getElementById('lightbox').classList.add('active');
                    });
                    gallery.appendChild(photoDiv);
                });

                pageInfos.forEach(info => info.innerText = `Page ${currentPage} of ${totalPages || 1}`);
                prevBtns.forEach(btn => btn.disabled = currentPage === 1);
                nextBtns.forEach(btn => btn.disabled = currentPage >= totalPages || totalPages === 0);
            }

            function applyFilters() {
                const checkedValues = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
                localStorage.setItem('joshwuff_filters', JSON.stringify(checkedValues));
                filteredPhotos = (checkedValues.includes('all') || checkedValues.length === 0)
                    ? [...allPhotos] : allPhotos.filter(photo => checkedValues.includes(photo.category));
                
                if (event && event.type === 'change') {
                    currentPage = 1;
                    localStorage.setItem('joshwuff_currentPage', currentPage);
                }
                renderGallery();
            }

            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', (event) => {
                    if (checkbox.value !== 'all' && checkbox.checked) document.querySelector('input[value="all"]').checked = false;
                    else if (checkbox.value === 'all' && checkbox.checked) checkboxes.forEach(cb => { if (cb.value !== 'all') cb.checked = false; });
                    if (!Array.from(checkboxes).some(cb => cb.checked)) document.querySelector('input[value="all"]').checked = true;
                    applyFilters();
                });
            });

            selectPerPage.addEventListener('change', (e) => {
                itemsPerPage = parseInt(e.target.value);
                localStorage.setItem('joshwuff_perPage', itemsPerPage);
                currentPage = 1;
                localStorage.setItem('joshwuff_currentPage', currentPage);
                renderGallery();
            });
            
            prevBtns.forEach(btn => btn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    localStorage.setItem('joshwuff_currentPage', currentPage);
                    renderGallery();
                    const topPagination = document.querySelector('.top-pagination');
                    const targetY = topPagination.getBoundingClientRect().top + window.scrollY - 70;
                    window.scrollTo({ top: targetY, behavior: 'smooth' });
                }
            }));
            
            nextBtns.forEach(btn => btn.addEventListener('click', () => {
                if (currentPage < Math.ceil(filteredPhotos.length / itemsPerPage)) {
                    currentPage++;
                    localStorage.setItem('joshwuff_currentPage', currentPage);
                    renderGallery();
                    const topPagination = document.querySelector('.top-pagination');
                    const targetY = topPagination.getBoundingClientRect().top + window.scrollY - 70;
                    window.scrollTo({ top: targetY, behavior: 'smooth' });
                }
            }));

            const lightbox = document.getElementById('lightbox');
            
            // Closing Lightbox logic with reset included
            document.querySelector('.lightbox-close').addEventListener('click', () => {
                lightbox.classList.remove('active');
                setTimeout(resetZoom, 300); // Give it time to fade out before resetting
            });
            
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    lightbox.classList.remove('active');
                    setTimeout(resetZoom, 300);
                }
            });

            document.getElementById('lightbox-prev').addEventListener('click', (e) => {
                e.stopPropagation(); if (filteredPhotos.length === 0) return;
                currentLightboxIndex = (currentLightboxIndex > 0) ? currentLightboxIndex - 1 : filteredPhotos.length - 1; updateLightboxImage();
            });
            document.getElementById('lightbox-next').addEventListener('click', (e) => {
                e.stopPropagation(); if (filteredPhotos.length === 0) return;
                currentLightboxIndex = (currentLightboxIndex < filteredPhotos.length - 1) ? currentLightboxIndex + 1 : 0; updateLightboxImage();
            });

            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'ArrowLeft') { currentLightboxIndex = (currentLightboxIndex > 0) ? currentLightboxIndex - 1 : filteredPhotos.length - 1; updateLightboxImage(); }
                else if (e.key === 'ArrowRight') { currentLightboxIndex = (currentLightboxIndex < filteredPhotos.length - 1) ? currentLightboxIndex + 1 : 0; updateLightboxImage(); }
                else if (e.key === 'Escape') {
                    lightbox.classList.remove('active');
                    setTimeout(resetZoom, 300);
                }
            });
        });

        window.addEventListener('beforeunload', () => {
            localStorage.setItem('joshwuff_scrollPos', window.scrollY);
        });
    </script>
</body>
</html>
