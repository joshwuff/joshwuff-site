<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joshwuff</title>
    <link rel="icon" type="image/png" href="favicon.png?v=2">
    <link rel="apple-touch-icon" href="favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">Socials</a>
        <a href="photography.html" class="nav-link">Photography</a>
        <a href="contact.html" class="nav-link active">Contact</a>
    </nav>

    <div class="container contact-container">
        <h1>Get in Touch</h1>
        <p class="bio">Whether you want to discuss a photography project, have a question about my fursuit work, or just want to say hi, my inbox is always open!</p>
        
        <div class="contact-box" style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
            <a href="mailto:your_email@example.com" class="email-btn" style="width: 100%; max-width: 300px;">Email Me</a>
            <a href="https://discord.gg/fnqvg7dyhR" class="social-link" target="_blank" style="margin: 0; width: 100%; max-width: 300px;">Discord Community</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Joshwuff. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const navLinks = document.querySelectorAll('.nav-link');
            const container = document.querySelector('.container');
            let isTransitioning = false;
            navLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    if (this.href !== window.location.href && !this.href.includes('mailto:')) {
                        e.preventDefault();
                        if (isTransitioning) return;
                        isTransitioning = true;
                        container.classList.add('fade-out');
                        setTimeout(() => { window.location.href = this.href; }, 400);
                    }
                });
            });
        });
    </script>
</body>
</html>
