<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Joshwuff</title>
    <link rel="icon" type="image/png" href="favicon.png?v=3">
    <link rel="apple-touch-icon" href="favicon.png?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0d0d12;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.25);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 15% 15%, rgba(239, 68, 68, 0.08) 0%, transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(185, 28, 28, 0.08) 0%, transparent 35%);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-y: scroll;
            background-size: 100% 100%;
            animation: breathe 10s infinite alternate ease-in-out;
        }

        @keyframes breathe {
            0% { background-size: 100% 100%; background-position: 0% 0%; }
            100% { background-size: 130% 130%; background-position: 5% 5%; }
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(13, 13, 18, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 18px 0;
            z-index: 1000;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-link:hover { color: var(--accent); }
        .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 4px; }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 120px 24px 60px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-size: 2.2rem; margin: 0; font-weight: 700; letter-spacing: -0.03em; }
        .subtitle { color: var(--accent); font-size: 1.1rem; margin-top: 8px; font-weight: 600; }
        .bio { font-size: 1rem; color: var(--text-secondary); margin: 24px 0 40px; line-height: 1.6; }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Identical button styling to the index page for consistency! */
        .contact-link {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 18px 24px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 1.05rem;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease !important;
            cursor: pointer;
            user-select: none;
        }

        .contact-link i {
            position: absolute;
            right: 24px;
            font-size: 1.3rem;
            width: 1.3rem;
            height: 1.3rem;
            opacity: 0.7;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        .contact-link:hover i {
            opacity: 1;
            transform: scale(1.15);
        }

        /* Email Button Hover - Signature Red Glow */
        .contact-email:hover {
            border-color: var(--accent) !important;
            box-shadow: 0 0 15px var(--accent-glow) !important;
            transform: translateY(-2px);
        }

        /* Discord Button Hover - Blurple Glow */
        .contact-discord:hover {
            border-color: #5865F2 !important;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.5) !important;
            color: #5865F2 !important;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 64px;
            padding-top: 32px;
            border-top: 1px solid var(--glass-border);
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="nav-link">Socials</a>
        <a href="photography.html" class="nav-link">Photography</a>
        <a href="contact.html" class="nav-link active">Contact</a>
    </nav>

    <div class="container">
        <h1>Get in Touch</h1>
        <div class="subtitle">Let's connect!</div>
        
        <p class="bio">Whether you have a question, want to collaborate, or just want to drop a friendly hello, my inbox is always open.</p>

        <div class="links-container">
            <a href="mailto:contact@joshwuff.com" class="contact-link contact-email">
                <span>Email Me</span>
                <i class="fa-solid fa-envelope"></i>
            </a>

            <a href="https://discord.gg/fnqvg7dyhR" class="contact-link contact-discord">
                <span>Join my Discord</span>
                <i class="fa-brands fa-discord"></i>
            </a>
        </div>

        <footer>
            <p>&copy; 2026 Joshwuff. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
